<div class="dashboard">

  <div class="sidebar">
    <h2>TaxPal</h2>

    <ul>
      <li>Dashboard</li>
      <li>Transactions</li>
      <li>Budgets</li>
      <li>Tax Estimator</li>
      <li>Reports</li>
    </ul>
  </div>

  <div class="content">

    <h1>Dashboard</h1>

    <div class="cards">

      <div class="card">
        <h3>Monthly Income</h3>
        <p>₹4200</p>
      </div>

      <div class="card">
        <h3>Monthly Expense</h3>
        <p>₹1000</p>
      </div>

      <div class="card">
        <h3>Savings</h3>
        <p>₹3200</p>
      </div>

    </div>

    <br>

    <button (click)="goIncome()">Add Income</button>

    <button (click)="goExpense()">Add Expense</button>

    <h3>Recent Transactions</h3>

    <table>
      <tr>
        <th>Description</th>
        <th>Amount</th>
        <th>Type</th>
      </tr>

      <tr>
        <td>Freelance Project</td>
        <td>5000</td>
        <td>Income</td>
      </tr>

      <tr>
        <td>Internet Bill</td>
        <td>1000</td>
        <td>Expense</td>
      </tr>
    </table>

  </div>

</div>
