<div class="container">

  <h2>Create an Account</h2>

  <input
    type="text"
    placeholder="Username"
    [(ngModel)]="username">

  <input
    type="text"
    placeholder="Full Name"
    [(ngModel)]="fullName">

  <input
    type="email"
    placeholder="Email"
    [(ngModel)]="email">

  <input
    type="password"
    placeholder="Password"
    [(ngModel)]="password">

  <input
    type="password"
    placeholder="Confirm Password"
    [(ngModel)]="confirmPassword">

  <input
    type="text"
    placeholder="Country"
    [(ngModel)]="country">

  <input
    type="text"
    placeholder="Income Bracket"
    [(ngModel)]="incomeBracket">

  <button (click)="createAccount()">
    Create Account
  </button>

</div>
