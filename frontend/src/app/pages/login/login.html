<div class="login-container">
  <div class="login-card">

    <h1>TaxPal</h1>
    <p>Sign in to your account</p>

    <input
      type="email"
      placeholder="Email"
      [(ngModel)]="email">

    <input
      type="password"
      placeholder="Password"
      [(ngModel)]="password">

    <button (click)="login()">
      Sign In
    </button>

    <p class="signup-link">
       Don't have an account?
       <a routerLink="/signup">Sign Up</a>
    </p>

  </div>
</div>
