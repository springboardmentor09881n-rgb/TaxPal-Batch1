<div class="login-container">
  <!-- Dynamic background glow decorations -->
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="bg-glow bg-glow-3"></div>

  <div class="login-card">
    <div class="brand-section">
      <div class="brand-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="1" x2="12" y2="23"></line>
          <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
        </svg>
      </div>
      <h1>TaxPal</h1>
      <p>Personal Finance & Tax Estimator</p>
    </div>

    <h2 class="card-title">Welcome back</h2>
    <p class="card-subtitle">Sign in to manage your freelance financials</p>

    @if (errorMessage) {
      <div class="alert alert-error">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="alert-icon">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <span>{{ errorMessage }}</span>
      </div>
    }

    <form (submit)="login(); $event.preventDefault()" class="login-form">
      <!-- Email Field -->
      <div class="input-group" [class.has-error]="emailError">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
          </span>
          <input
            id="email"
            type="email"
            placeholder="Enter your email"
            [(ngModel)]="email"
            name="email"
            (input)="onEmailInput()"
            (blur)="validateEmail()">
        </div>
        @if (emailError) {
          <span class="error-text">{{ emailError }}</span>
        }
      </div>

      <!-- Password Field -->
      <div class="input-group" [class.has-error]="passwordError">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
          </span>
          <input
            id="password"
            type="password"
            placeholder="Enter your password"
            [(ngModel)]="password"
            name="password"
            (input)="onPasswordInput()"
            (blur)="validatePassword()">
        </div>
        @if (passwordError) {
          <span class="error-text">{{ passwordError }}</span>
        }
      </div>

      <!-- Sign In Button -->
      <button type="submit" class="btn btn-primary" [disabled]="isLoading">
        @if (isLoading) {
          <span class="spinner"></span>
          <span>Signing in...</span>
        } @else {
          <span>Sign In</span>
          <svg class="btn-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12,5 19,12 12,19"></polyline>
          </svg>
        }
      </button>
    </form>

    <div class="footer-links">
      <p class="signup-link">
        Don't have an account?
        <a routerLink="/signup">Sign up for free</a>
      </p>
    </div>
  </div>
</div>
