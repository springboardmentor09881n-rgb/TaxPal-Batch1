<div class="container">

  <h2>Record New Expense</h2>
  <p>Add details about your expense to track your spending better.</p>

  <div class="row">

    <div class="field">
      <label>Description <span>*</span></label>
      <input
        type="text"
        placeholder="e.g. Office Rent"
        [(ngModel)]="description">
    </div>

    <div class="field">
      <label>Amount <span>*</span></label>
      <input
        type="number"
        placeholder="$ 0.00"
        [(ngModel)]="amount">
    </div>

  </div>

  <div class="row">

    <div class="field">
      <label>Category <span>*</span></label>
      <input
        type="text"
        placeholder="Select a category"
        [(ngModel)]="category">
    </div>

    <div class="field">
      <label>Date <span>*</span></label>
      <input
        type="date"
        [(ngModel)]="transactionDate">
    </div>

  </div>

  <label>Notes (Optional)</label>

  <textarea
    rows="4"
    placeholder="Add any additional details..."
    [(ngModel)]="notes">
  </textarea>

  <div class="buttons">

    <button
      type="button"
      class="cancel-btn"
      routerLink="/dashboard">
      Cancel
    </button>

    <button
      type="button"
      class="expense-btn"
      (click)="saveExpense()">
      Save
    </button>

  </div>

</div>
